<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
</head>
<body>
    <div class="container">
        <header class="post-header">
            <div class="profile-left">
                <img src="profile.jpg" alt="프로필 사진" class="profile-img">
                <div class="profile-text">
                    <span class="user-id">likelion-dongguk</span>
                    <span class="location">동국대학교</span>
                </div>
            </div>
            <div class="post-more">...</div>
        </header>

        <div class="post-image">
            <img src="gamja.jpg" alt="게시글 사진" class="main-photo">
        </div>

        <div class="post-icons">
            <div class="icons-left">
                <i class="fa-sharp fa-solid fa-heart" style="color: rgb(255, 0, 0);"></i>
                <i class="fa-regular fa-comment" style="color: white;"></i>
                <i class="fa-regular fa-paper-plane" style="color: white;"></i>
            </div>
            
            <i class="fa-regular fa-bookmark" style="color: white;"></i>

        </div>

        <div class="post-content">
            <p class="first"><strong>loveliong_14</strong>님 외 <strong>48명</strong>이 좋아합니다</p>
            <p class="second"><strong>likelion-dongguk</strong> 귀여운 깜자를 소개합니다!</p>
            <p class="date">4월 18일</p>
        </div>

    </div>
</body>
</html>
